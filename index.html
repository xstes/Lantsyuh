<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #000; --card-bg: #111; --text: #fff; --gray: #888; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding: 10px; padding-bottom: 120px; -webkit-tap-highlight-color: transparent; }
        
        .header { text-align: center; font-size: 22px; letter-spacing: 5px; margin: 20px 0 10px; font-weight: bold; }
        .main-desc { text-align: center; font-size: 13px; color: var(--gray); margin-bottom: 25px; line-height: 1.4; }
        
        .nav-menu { display: flex; gap: 10px; overflow-x: auto; padding: 10px 0 20px; margin-bottom: 5px; -webkit-overflow-scrolling: touch; }
        .nav-menu::-webkit-scrollbar { display: none; }
        .nav-item { background: #111; color: var(--gray); padding: 8px 16px; border-radius: 20px; font-size: 13px; white-space: nowrap; border: 1px solid #222; cursor: pointer; transition: 0.2s; }
        .nav-item.active { background: #fff; color: #000; border-color: #fff; font-weight: bold; }

        .container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .card { background: var(--card-bg); border-radius: 12px; overflow: hidden; border: 1px solid #222; position: relative; display: flex; flex-direction: column; }
        
        .card-img-wrapper { width: 100%; aspect-ratio: 1/1; background: #000; display: flex; align-items: center; justify-content: center; padding: 8px; box-sizing: border-box; overflow: hidden; }
        .card img { max-width: 100%; max-height: 100%; object-fit: contain; display: block; border-radius: 4px; }
        
        .status-badge { position: absolute; top: 8px; left: 8px; font-size: 8px; padding: 3px 6px; border-radius: 4px; text-transform: uppercase; font-weight: bold; background: rgba(0,0,0,0.7); z-index: 5; }
        .status-available { color: #4caf50; }
        .status-order { color: #ff9800; }
        
        .card-content { padding: 10px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .title { font-size: 12px; color: var(--gray); margin-bottom: 4px; height: 30px; overflow: hidden; line-height: 1.2; }
        .price { font-weight: bold; font-size: 14px; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1000; background: #000; overflow-y: auto; }
        .close-modal { position: fixed; top: 20px; right: 20px; z-index: 1100; background: rgba(0,0,0,0.5); color: #fff; width: 35px; height: 35px; border-radius: 50%; text-align: center; line-height: 33px; font-size: 24px; border: 1px solid #555; }

        .m-carousel { position: relative; width: 100%; aspect-ratio: 1/1; overflow: hidden; background: #fff; display: flex; align-items: center; }
        .m-carousel-track { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; scroll-behavior: smooth; height: 100%; width: 100%; -webkit-overflow-scrolling: touch; }
        .m-carousel-track::-webkit-scrollbar { display: none; }
        .m-carousel-track img { width: 100%; flex-shrink: 0; scroll-snap-align: start; object-fit: contain; }
        
        .m-carousel-dots { position: absolute; bottom: 15px; width: 100%; display: flex; justify-content: center; gap: 5px; pointer-events: none; }
        .dot { width: 6px; height: 6px; background: rgba(0,0,0,0.2); border-radius: 50%; }
        .dot.active { background: #000; transform: scale(1.2); }

        .modal-info { padding: 20px; }
        .m-title { font-size: 24px; font-weight: bold; margin-bottom: 10px; }
        .m-price { font-size: 20px; font-weight: bold; margin-bottom: 15px; }
        .m-material, .m-desc { color: #fff; line-height: 1.6; font-size: 14px; margin-bottom: 15px; }
        .info-label { color: var(--gray); font-size: 11px; text-transform: uppercase; margin-bottom: 3px; margin-top: 15px; }

        .btn-group { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        .btn-main { background: #fff; color: #000; text-align: center; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-sec { background: transparent; color: #fff; border: 1px solid #333; text-align: center; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        
        .form-box { display: none; flex-direction: column; gap: 10px; margin-top: 20px; }
        textarea { background: #111; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 8px; font-family: inherit; resize: none; width: 100%; box-sizing: border-box; outline: none; }

        #toast { display: none; position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #fff; color: #000; padding: 12px 24px; border-radius: 30px; font-size: 14px; font-weight: bold; z-index: 3000; box-shadow: 0 5px 20px rgba(0,0,0,0.5); }

        .footer { padding: 40px 20px; text-align: center; }
        .contact-btn { color: var(--gray); font-size: 12px; text-decoration: underline; cursor: pointer; }
    </style>
</head>
<body>

    <div class="main-desc">Лимитированные аксессуары ручной работы.</div>
    
    <div class="nav-menu">
        <div class="nav-item active" onclick="filterCat('все', this)">Все</div>
        <div class="nav-item" onclick="filterCat('ожерелья', this)">Ожерелья</div>
        <div class="nav-item" onclick="filterCat('кольца', this)">Кольца</div>
        <div class="nav-item" onclick="filterCat('серьги', this)">Серьги</div>
<div class="nav-item" onclick="filterCat('браслеты', this)">Браслеты</div>
    </div>
    
    <div class="container" id="catalog"></div>

    <div class="footer">
        <div id="footerBtn" class="contact-btn" onclick="showFooterForm()">СВЯЗАТЬСЯ С МЕНЕДЖЕРОМ</div>
        <div id="footerForm" class="form-box">
            <textarea id="footerInput" rows="3" placeholder="Ваш вопрос..."></textarea>

            <div class="btn-sec" onclick="hideFooterForm()">ОТМЕНА</div>

    <div id="productModal" class="modal">

        <div class="m-carousel">

            <div class="m-carousel-dots" id="dots"></div>
        </div>
        <div class="modal-info">

            <div id="m-title" class="m-title"></div>
            <div id="m-price" class="m-price"></div>
            <div class="info-label">Материал</div><div id="m-material" class="m-material"></div>
            <div class="info-label">Описание</div><div id="m-desc" class="m-desc"></div>
            
            <div id="prodBtns" class="btn-group">
                <div class="btn-main" onclick="addToCart()">В корзину</div>
                <div class="btn-sec" onclick="showProdForm()">Задать вопрос</div>
            </div>

            <div id="prodForm" class="form-box">
                <textarea id="prodInput" rows="3" placeholder="Ваш вопрос по этому изделию..."></textarea>

                <div class="btn-sec" onclick="hideProdForm()">ОТМЕНА</div>
            </div>
        </div>
    </div>

    <div id="toast"></div>

        const catalog = document.getElementById('catalog');

        function renderCatalog(filter = 'все') {
            catalog.innerHTML = '';
            const filtered = filter === 'все' ? products : products.filter(p => p.category === filter);
            
            filtered.forEach(p => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="status-badge ${p.status === 'доступно' ? 'status-available' : 'status-order'}">${p.status}</div>
                    <div class="card-img-wrapper"><img src="${p.imgs[0]}"></div>
                    <div class="card-content"><div class="title">${p.name}</div><div class="price">${p.price}</div></div>`;
                card.onclick = () => openProduct(p);
                catalog.appendChild(card);
            });
        }

        function filterCat(cat, el) {
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            el.classList.add('active');
            renderCatalog(cat);
        }

        function openProduct(p) {
            currentP = p;
            document.getElementById('m-title').innerText = p.name;
            document.getElementById('m-price').innerText = p.price;
            document.getElementById('m-material').innerText = p.mat;
            document.getElementById('m-desc').innerText = p.desc;
            const st = document.getElementById('m-status');
            st.innerText = p.status.toUpperCase();
            st.style.color = p.status === 'доступно' ? '#4caf50' : '#ff9800';

            const track = document.getElementById('track');
            const dots = document.getElementById('dots');
            track.innerHTML = ''; dots.innerHTML = ''; track.scrollLeft = 0;
            p.imgs.forEach((src, idx) => {
                const img = document.createElement('img'); img.src = src; track.appendChild(img);
                const dot = document.createElement('div'); dot.className = 'dot' + (idx === 0 ? ' active' : ''); dots.appendChild(dot);
            });
            track.onscroll = () => {
                const idx = Math.round(track.scrollLeft / track.offsetWidth);
                Array.from(dots.children).forEach((d, i) => d.className = 'dot' + (i === idx ? ' active' : ''));
            };
            hideProdForm();
            document.getElementById('productModal').style.display = 'block';
        }

        function addToCart() {
            if (!cart.includes(currentP.name)) cart.push(currentP.name);
            tg.MainButton.setParams({ text: "ПОДТВЕРДИТЬ ЗАКАЗ", color: "#ffffff", text_color: "#000000" });
            tg.MainButton.show();
            tg.MainButton.offClick(executeOrder); 
            tg.MainButton.onClick(executeOrder);
            showToast("Добавлено в заказ!");
            closeProduct();
        }

        function executeOrder() { tg.sendData("Заказ: " + cart.join(", ")); tg.MainButton.hide(); }

        function sendMsg(type) {
            let text = "";
            if (type === 'question') text = "Вопрос по [" + currentP.name + "]: " + document.getElementById('prodInput').value;
            if (type === 'manager') text = "Сообщение менеджеру: " + document.getElementById('footerInput').value;
            if (text.length < 5) return;
            window.pendingText = text;
            tg.MainButton.setParams({ text: "ПОДТВЕРДИТЬ ОТПРАВКУ", color: "#ffffff", text_color: "#000000" });
            tg.MainButton.show();
            tg.MainButton.offClick(executeMsg);
            tg.MainButton.onClick(executeMsg);
            showToast("Нажмите кнопку подтверждения внизу");
            closeProduct(); hideFooterForm();
        }

        function executeMsg() { tg.sendData(window.pendingText); tg.MainButton.hide(); }
        function closeProduct() { document.getElementById('productModal').style.display = 'none'; }
        function showToast(txt) { const t = document.getElementById('toast'); t.innerText = txt; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 3000); }
        function showProdForm() { document.getElementById('prodBtns').style.display = 'none'; document.getElementById('prodForm').style.display = 'flex'; }
        function hideProdForm() { document.getElementById('prodBtns').style.display = 'flex'; document.getElementById('prodForm').style.display = 'none'; }
        function showFooterForm() { document.getElementById('footerBtn').style.display = 'none'; document.getElementById('footerForm').style.display = 'flex'; }
        function hideFooterForm() { document.getElementById('footerBtn').style.display = 'inline-block'; document.getElementById('footerForm').style.display = 'none'; }

        renderCatalog();
    </script>
</body>
</html>
