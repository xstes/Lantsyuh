<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #000; --card-bg: #111; --text: #fff; --gray: #888; --toast-bg: rgba(255,255,255,0.9); --toast-text: #000; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding: 10px; padding-bottom: 120px; -webkit-tap-highlight-color: transparent; }
        .header { text-align: center; font-size: 22px; letter-spacing: 5px; margin: 20px 0 10px; font-weight: bold; }
        .main-desc { text-align: center; font-size: 13px; color: var(--gray); margin-bottom: 25px; padding: 0 10px; line-height: 1.4; }
        .container { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .card { background: var(--card-bg); border-radius: 12px; overflow: hidden; border: 1px solid #222; position: relative; }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; display: block; pointer-events: none; }
        .status-badge { position: absolute; top: 8px; left: 8px; font-size: 9px; padding: 3px 6px; border-radius: 4px; text-transform: uppercase; font-weight: bold; background: rgba(0,0,0,0.6); z-index: 5; }
        .status-available { color: #4caf50; }
        .status-order { color: #ff9800; }
        .card-content { padding: 10px; }
        .title { font-size: 13px; color: var(--gray); margin-bottom: 4px; height: 32px; overflow: hidden; }
        .price { font-weight: bold; font-size: 15px; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1000; overflow-y: auto; background: #000; }
        .close-modal { position: fixed; top: 20px; right: 20px; z-index: 1100; background: rgba(0,0,0,0.5); color: #fff; width: 35px; height: 35px; border-radius: 50%; text-align: center; line-height: 33px; font-size: 24px; cursor: pointer; border: 1px solid #555; }

        .m-carousel { position: relative; width: 100%; aspect-ratio: 1/1; background: #fff; overflow: hidden; }
        .m-carousel-track { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; scroll-behavior: smooth; height: 100%; -webkit-overflow-scrolling: touch; }
        .m-carousel-track::-webkit-scrollbar { display: none; }
        .m-carousel-track img { width: 100%; flex-shrink: 0; scroll-snap-align: start; object-fit: cover; aspect-ratio: 1/1; }
        
        .m-carousel-dots { position: absolute; bottom: 15px; width: 100%; display: flex; justify-content: center; gap: 5px; z-index: 10; pointer-events: none; }
        .dot { width: 6px; height: 6px; background: rgba(0,0,0,0.2); border-radius: 50%; transition: 0.2s; }
        .dot.active { background: rgba(0,0,0,0.6); transform: scale(1.2); }

        .modal-info { padding: 20px; }
        .m-status { font-size: 12px; margin-bottom: 10px; font-weight: bold; }
        .m-title { font-size: 24px; font-weight: bold; margin-bottom: 10px; }
        .m-price { font-size: 20px; font-weight: bold; margin-bottom: 15px; }
        .info-label { color: var(--gray); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 3px; margin-top: 15px; }
        .m-material, .m-desc { color: #fff; line-height: 1.6; font-size: 14px; margin-bottom: 15px; }

        .btn-group { display: flex; flex-direction: column; gap: 10px; margin-top: 30px; }
        .btn-main { background: #fff; color: #000; text-align: center; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-sec { background: transparent; color: #fff; border: 1px solid #333; text-align: center; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        
        #toast { display: none; position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: var(--toast-bg); color: var(--toast-text); padding: 10px 25px; border-radius: 25px; font-size: 14px; font-weight: bold; z-index: 3000; }
    </style>
</head>
<body>

    <div class="header">LANTSYUH</div>
    <div class="main-desc">Лимитированные аксессуары ручной работы.</div>
    
    <div class="container" id="catalog"></div>

    <div id="productModal" class="modal">
        <div class="close-modal" onclick="closeProduct()">&times;</div>
        <div class="m-carousel">
            <div class="m-carousel-track" id="track"></div>
            <div class="m-carousel-dots" id="dots"></div>
        </div>
        <div class="modal-info">
            <div id="m-status" class="m-status"></div>
            <div id="m-title" class="m-title"></div>
            <div id="m-price" class="m-price"></div>
            <div class="info-label">Материал</div><div id="m-material" class="m-material"></div>
            <div class="info-label">Описание</div><div id="m-desc" class="m-desc"></div>
            <div class="btn-group">
                <div class="btn-main" id="orderBtn">В корзину</div>
                <div class="btn-sec" id="askBtn">Задать вопрос</div>
            </div>
        </div>
    </div>

    <div id="toast">Добавлено!</div>

    <script>
        let tg = window.Telegram.WebApp;
        let currentProductTitle = "";
        let pendingData = ""; // Храним текст для отправки
        tg.expand();

        // Настройка MainButton (чтобы не вылетало)
        tg.MainButton.setParams({
            text: "ПОДТВЕРДИТЬ ЗАКАЗ",
            color: "#ffffff",
            text_color: "#000000"
        });

        tg.MainButton.onClick(function() {
            tg.sendData(pendingData); // Вот тут бот закроется, но только ПОСЛЕ нажатия этой кнопки
        });

        const products = [
            { name: 'GLEAM', price: '3800₽', mat: 'Агат, кварц', desc: 'Игра света в каждой грани натуральных камней.', status: 'доступно', imgs: ['https://github.com/xstes/Lantsyuh/blob/main/IMG/GLEAM/GLEAM%203.PNG?raw=true', 'https://github.com/xstes/Lantsyuh/blob/main/IMG/GLEAM/GLEAM%202.JPG?raw=true', 'https://github.com/xstes/Lantsyuh/blob/main/IMG/GLEAM/GLEAM.JPG?raw=true'] },
            { name: 'RAY', price: '3800₽', mat: 'Красная яшма', desc: 'Яркая энергия яшмы, притягивающая взгляды.', status: 'доступно', imgs: ['https://github.com/xstes/Lantsyuh/blob/main/IMG/RAY/RAY.PNG?raw=true', 'https://github.com/xstes/Lantsyuh/blob/main/IMG/RAY/RAY%202%20.JPG?raw=true', 'https://github.com/xstes/Lantsyuh/blob/main/IMG/RAY/RAY%203.JPG?raw=true'] },
            { name: 'ALBA', price: '4200₽', mat: 'Разноцветный агат, горный хрусталь', desc: 'Уникальный узор природы.', status: 'доступно', imgs: ['https://github.com/xstes/Lantsyuh/blob/main/IMG/ALBA/ALBA%201.PNG?raw=true', 'https://github.com/xstes/Lantsyuh/blob/main/IMG/ALBA/ALBA.JPG?raw=true'] },
            { name: 'MOON', price: '3800₽', mat: 'Молочный кварц', desc: 'Мистическое сияние ночного светила.', status: 'доступно', imgs: ['https://github.com/xstes/Lantsyuh/blob/main/IMG/MOON/MOON%203.PNG?raw=true', 'https://github.com/xstes/Lantsyuh/blob/main/IMG/MOON/MOON%202.JPG?raw=true', 'https://github.com/xstes/Lantsyuh/blob/main/IMG/MOON/MOON.JPG?raw=true'] },
            { name: 'LUME', price: '3500₽', mat: 'Молочный кварц, мед. сталь', desc: 'Изящные серьги.', status: 'под заказ', imgs: ['https://github.com/xstes/Lantsyuh/blob/main/IMG/LUME/LUME%203.PNG?raw=true', 'https://github.com/xstes/Lantsyuh/blob/main/IMG/LUME/LUME%202.JPG?raw=true', 'https://github.com/xstes/Lantsyuh/blob/main/IMG/LUME/LUME.JPG?raw=true'] },
            { name: 'FLOWER GUM', price: '4000₽', mat: 'Розовый кошачий глаз', desc: 'Массивный чокер с мягким свечением.', status: 'доступно', imgs: ['https://github.com/xstes/Lantsyuh/blob/main/IMG/FLOWER%20GUM/FLOWER%20GUM.JPG?raw=true', 'https://github.com/xstes/Lantsyuh/blob/main/IMG/FLOWER%20GUM/FLOWER%20GUM%201.JPG?raw=true'] },
            { name: 'TIGA', price: '3900₽', mat: 'Тигровый глаз', desc: 'Оберег и украшение.', status: 'доступно', imgs: ['https://github.com/xstes/Lantsyuh/blob/main/IMG/TIGA/TIGA.JPG?raw=true', 'https://github.com/xstes/Lantsyuh/blob/main/IMG/TIGA/TIGA%202.JPG?raw=true', 'https://github.com/xstes/Lantsyuh/blob/main/IMG/TIGA/TIGA%201.JPG?raw=true'] },
            { name: 'AZUL', price: '3800₽', mat: 'Лазурит', desc: 'Глубина ночного неба.', status: 'доступно', imgs: ['https://github.com/xstes/Lantsyuh/blob/main/IMG/AZUL/AZUL.PNG?raw=true'] },
            { name: 'SOLA', price: '4200₽', mat: 'Гематит, кошачий глаз', desc: 'Элегантный чокер SOLA.', status: 'доступно', imgs: ['https://github.com/xstes/Lantsyuh/blob/main/IMG/SOLA/SOLA.PNG?raw=true', 'https://github.com/xstes/Lantsyuh/blob/main/IMG/SOLA/SOLA%201.JPG?raw=true', 'https://github.com/xstes/Lantsyuh/blob/main/IMG/SOLA/Sola%202.jpeg?raw=true'] },
            { name: 'BLACKOUT Bracelet', price: '3500₽', mat: 'Черный оникс', desc: 'Строгий браслет.', status: 'доступно', imgs: ['https://github.com/xstes/Lantsyuh/blob/main/IMG/BLACKOUT/BLACKOUT.PNG?raw=true'] },
            { name: 'BLACKOUT Neck', price: '4200₽', mat: 'Черный оникс', desc: 'Массивное шейное украшение.', status: 'доступно', imgs: ['https://github.com/xstes/Lantsyuh/blob/main/IMG/BLACKOUT%20NECK/BLACKOUT%20NECK.PNG?raw=true', 'https://github.com/xstes/Lantsyuh/blob/main/IMG/BLACKOUT%20NECK/BLACKOUT%20NECK%201.JPG?raw=true'] },
            { name: 'GRAY', price: '4200₽', mat: 'Окаменелый коралл', desc: 'Редкий материал.', status: 'доступно', imgs: ['https://github.com/xstes/Lantsyuh/blob/main/IMG/GRAY/GRAY.PNG?raw=true', 'https://github.com/xstes/Lantsyuh/blob/main/IMG/GRAY/GRAY%201.JPG?raw=true'] }
        ];

        const catalog = document.getElementById('catalog');
        products.forEach(p => {
            const card = document.createElement('div');
            card.className = 'card';
            card.onclick = () => openProduct(p);
            card.innerHTML = `
                <div class="status-badge ${p.status === 'доступно' ? 'status-available' : 'status-order'}">${p.status}</div>
                <img src="${p.imgs[0]}">
                <div class="card-content"><div class="title">${p.name}</div><div class="price">${p.price}</div></div>
            `;
            catalog.appendChild(card);
        });

        function openProduct(p) {
            currentProductTitle = p.name;
            document.getElementById('m-title').innerText = p.name;
            document.getElementById('m-price').innerText = p.price;
            document.getElementById('m-material').innerText = p.mat;
            document.getElementById('m-desc').innerText = p.desc;
            
            const statusEl = document.getElementById('m-status');
            statusEl.innerText = p.status.toUpperCase();
            statusEl.className = 'm-status ' + (p.status === 'доступно' ? 'status-available' : 'status-order');

            const track = document.getElementById('track');
            const dots = document.getElementById('dots');
            track.innerHTML = ''; dots.innerHTML = '';
            track.scrollLeft = 0;

            p.imgs.forEach((src, idx) => {
                const img = document.createElement('img');
                img.src = src;
                track.appendChild(img);
                const dot = document.createElement('div');
                dot.className = 'dot' + (idx === 0 ? ' active' : '');
                dots.appendChild(dot);
            });

            track.onscroll = () => {
                const idx = Math.round(track.scrollLeft / track.offsetWidth);
                Array.from(dots.children).forEach((d, i) => d.className = 'dot' + (i === idx ? ' active' : ''));
            };

            // ЛОГИКА БЕЗ ВЫЛЕТА:
            document.getElementById('orderBtn').onclick = () => {
                pendingData = "Заказ: " + p.name;
                tg.MainButton.setText("ПОДТВЕРДИТЬ ЗАКАЗ: " + p.name);
                tg.MainButton.show(); // Показываем кнопку подтверждения
                closeProduct();
                showToast("Добавлено! Нажми кнопку внизу.");
            };

            document.getElementById('askBtn').onclick = () => {
                pendingData = "Вопрос по товару: " + p.name;
                tg.MainButton.setText("ОТПРАВИТЬ ВОПРОС ПО " + p.name);
                tg.MainButton.show();
                closeProduct();
                showToast("Напиши вопрос в чате после подтверждения.");
            };

            document.getElementById('productModal').style.display = 'block';
        }

        function closeProduct() { document.getElementById('productModal').style.display = 'none'; }
        function showToast(text = "Добавлено!") {
            const t = document.getElementById('toast');
            t.innerText = text; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }
    </script>
</body>
</html>
